name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    name: Playwright (${{ matrix.label }})
    # Core e2e exceeded GitHub's 6h single-job cap; shard into 3 parallel jobs (each << 6h).
    # Bracket key matches matrix include (required for this workflow file).
    timeout-minutes: ${{ matrix['job-timeout'] }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 'core 1/3'
            lane: core-shard-1
            shard: '1/3'
            job-timeout: 180
          - label: 'core 2/3'
            lane: core-shard-2
            shard: '2/3'
            job-timeout: 180
          - label: 'core 3/3'
            lane: core-shard-3
            shard: '3/3'
            job-timeout: 180
          - label: retention-engagement
            lane: retention-engagement
            job-timeout: 60
          - label: onboarding-activation
            lane: onboarding-activation
            job-timeout: 60
          - label: referral-growth-db
            lane: referral-growth-db
            job-timeout: 60
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: allfantasy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d allfantasy_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Run foundation apply branch tests
      if: matrix.lane == 'referral-growth-db'
      run: npm run test:foundation-apply-branches
    - name: Install Playwright Browsers
      if: startsWith(matrix.lane, 'core-shard-')
      run: npx playwright install --with-deps
    - name: Install Playwright Chromium
      if: matrix.lane == 'referral-growth-db' || matrix.lane == 'onboarding-activation' || matrix.lane == 'retention-engagement'
      run: npx playwright install --with-deps chromium
    # Schema bootstrap — applied to both `referral-growth-db` (always
    # needed) and `core` (added in fix/ci-playwright-core-schema-bootstrap).
    # Without these steps, the `core` lane hits 60-min `timeout-minutes`
    # because every Playwright test that exercises auth fails on
    # `relation "public.app_users" does not exist`. Other lanes
    # (retention-engagement, onboarding-activation) currently pass without
    # bootstrap and are intentionally NOT widened here — keep this fix
    # surgical to the lane it's known to break on.
    - name: Prepare DB schema
      if: matrix.lane == 'referral-growth-db' || matrix.lane == 'core'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npx prisma db push --skip-generate
    - name: Apply platform-backend foundation SQL
      if: matrix.lane == 'referral-growth-db' || matrix.lane == 'core'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npm run db:foundation:apply
    - name: Apply platform-backend supplemental indexes
      if: matrix.lane == 'referral-growth-db' || matrix.lane == 'core'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npm run db:indexes:platform-backend
    - name: Verify platform-backend indexes
      if: matrix.lane == 'referral-growth-db' || matrix.lane == 'core'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npm run db:indexes:verify-platform-backend
    - name: Run Playwright tests (core)
      if: startsWith(matrix.lane, 'core-shard-')
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        NEXTAUTH_SECRET: ci-nextauth-secret
        NEXTAUTH_URL: http://localhost:3000
      run: npm run test:e2e:core -- --shard=${{ matrix.shard }}
    - name: Run Playwright tests (retention engagement)
      if: matrix.lane == 'retention-engagement'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        NEXTAUTH_SECRET: ci-nextauth-secret
        NEXTAUTH_URL: http://localhost:3000
      run: npm run test:e2e:retention
    - name: Run Playwright tests (onboarding activation)
      if: matrix.lane == 'onboarding-activation'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        NEXTAUTH_SECRET: ci-nextauth-secret
        NEXTAUTH_URL: http://localhost:3000
      run: npm run test:e2e:onboarding-activation
    - name: Run Playwright tests (referral growth db)
      if: matrix.lane == 'referral-growth-db'
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        NEXTAUTH_SECRET: ci-nextauth-secret
        NEXTAUTH_URL: http://localhost:3000
      run: npx playwright test e2e/referral-growth-suite.spec.ts --project=chromium
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-${{ matrix.lane }}
        path: playwright-report/
        retention-days: 30

  draft-room-regression:
    name: Draft Room Regression
    timeout-minutes: 30
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: allfantasy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d allfantasy_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Prepare DB schema
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npx prisma db push --skip-generate
    - name: Apply platform-backend foundation SQL
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npm run db:foundation:apply
    - name: Install Playwright Chromium
      run: npx playwright install --with-deps chromium
    - name: Prepare DB schema for draft-room regression
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npx prisma db push --skip-generate
    - name: Apply platform-backend foundation SQL
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      run: npm run db:foundation:apply
    - name: Run draft-room regression
      env:
        DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
        NEXTAUTH_SECRET: ci-nextauth-secret
        NEXTAUTH_URL: http://localhost:3000
      run: npm run test:e2e:draft-room:chromium
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report-draft-room
        path: playwright-report/
        retention-days: 30
