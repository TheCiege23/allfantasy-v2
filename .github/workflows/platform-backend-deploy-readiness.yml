name: Platform Backend Deploy Readiness

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  platform-backend-deploy-readiness:
    name: Platform Backend Deploy Readiness
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: allfantasy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d allfantasy_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run foundation apply branch tests
        run: npm run test:foundation-apply-branches

      - name: Run platform-backend deploy readiness gate
        run: npm run db:deploy-readiness:platform-backend:ci:readonly
