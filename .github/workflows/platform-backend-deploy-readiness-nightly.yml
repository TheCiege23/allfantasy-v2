name: Platform Backend Deploy Readiness Nightly

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  platform-backend-deploy-readiness-nightly:
    name: Platform Backend Deploy Readiness (Nightly Write Mode)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: allfantasy_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d allfantasy_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci
      POSTGRES_PRISMA_URL: postgresql://postgres:postgres@127.0.0.1:5432/allfantasy_ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Run foundation apply branch tests
        run: npm run test:foundation-apply-branches

      - name: Run platform-backend deploy readiness gate (write mode)
        shell: bash
        run: |
          set -o pipefail
          npm run db:deploy-readiness:platform-backend:ci 2>&1 | tee platform-backend-deploy-readiness-nightly.log

      - name: Emit warning on nightly failure
        if: failure()
        run: echo "::warning::Platform backend nightly write-mode readiness gate failed. See workflow logs and uploaded artifact."

      - name: Create or update nightly failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Platform Backend Nightly Canary Failure'
            const marker = '<!-- platform-backend-nightly-canary -->'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const ts = new Date().toISOString()
            const body = [
              marker,
              '## Platform Backend Nightly Canary — Latest Failure',
              '',
              `**Last failed:** ${ts}`,
              '',
              `- **Workflow run:** ${runUrl}`,
              `- **Commit:** ${context.sha}`,
              `- **Trigger:** ${context.eventName}`,
              '',
              'See attached artifact `platform-backend-deploy-readiness-nightly-log` for details.',
              '',
              '> This issue body is overwritten on each failure. Historical runs are available in the Actions log.',
            ].join('\n')

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })

            const existing = issues.find((issue) => issue.title === title)

            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure'],
              })
              core.info('Created new nightly canary failure issue.')
            } else {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              })
              core.info(`Updated rolling status on issue #${existing.number}.`)
            }

      - name: Close nightly failure issue on success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const title = 'Platform Backend Nightly Canary Failure'
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            })
            const existing = issues.find((issue) => issue.title === title)
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Nightly canary **passed** on [${context.sha.slice(0, 7)}](${runUrl}). Auto-closing.`,
              })
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: 'closed',
              })
              core.info(`Closed resolved canary issue #${existing.number}.`)
            }

      - name: Upload nightly readiness log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-backend-deploy-readiness-nightly-log
          path: platform-backend-deploy-readiness-nightly.log
          retention-days: 14
