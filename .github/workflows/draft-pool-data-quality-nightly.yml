name: Draft Pool Data-Quality Nightly Sweep

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  sweep:
    name: Draft Pool Data-Quality Sweep (11 checks / all leagues)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_URL: ${{ secrets.DIRECT_URL }}
      POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run draft-pool multi-league sweep
        id: sweep
        shell: bash
        run: |
          set -o pipefail
          npm run draft-pool:sweep-multi-league 2>&1 | tee draft-pool-sweep.log
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Upload sweep log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: draft-pool-sweep-${{ github.run_number }}
          path: draft-pool-sweep.log
          retention-days: 14

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `[Auto] Draft pool data-quality sweep FAILED — ${new Date().toISOString().slice(0,10)}`;
            const body = [
              '## Draft Pool Data-Quality Sweep Failed',
              '',
              `**Run:** [${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              '',
              'One or more leagues failed the 11-check data-quality gate.',
              'Check the uploaded `draft-pool-sweep-*.log` artifact for per-league details.',
              '',
              '### Remediation',
              '```bash',
              '# Re-warm affected leagues',
              'npm run draft-pool:cache:warm -- --leagueId <id>',
              '',
              '# Apply Sleeper ID backfill if identityMissingSleeperForward > 0',
              'npm run draft-pool:backfill-blocked-sleeper-ids -- --leagueId <id> --apply',
              '',
              '# Re-run sweep to confirm',
              'npm run draft-pool:sweep-multi-league',
              '```',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['data-quality', 'draft-pool', 'automated'],
            });
