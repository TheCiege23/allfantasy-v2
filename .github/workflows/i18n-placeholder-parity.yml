name: i18n placeholder parity

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  i18n-placeholder-parity:
    name: EN/ES placeholder parity
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Verify shared keys use matching {{placeholders}} in en vs es
        run: npm run test:i18n
